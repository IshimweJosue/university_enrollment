{% extends 'base.html' %}

{% block title %}Register - University Enrollment System{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Register</h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Register</button>
    </form>
    
    <p>Already have an account? <a href="/login/">Login here</a></p>
</div>
{% endblock %}
