{% extends 'base.html' %}

{% block title %}Delete Professor{% endblock %}

{% block content %}
<div class="confirm-delete">
    <h2>Delete Professor</h2>
    <p class="warning">Are you sure you want to delete <strong>{{ professor.user.get_full_name }}</strong>?</p>
    <p class="info">This action cannot be undone.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="/professors/{{ professor.id }}/" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
