{% extends 'base.html' %}

{% block title %}Delete Course{% endblock %}

{% block content %}
<div class="confirm-delete">
    <h2>Delete Course</h2>
    <p class="warning">Are you sure you want to delete <strong>{{ course.course_code }}: {{ course.title }}</strong>?</p>
    <p class="info">This action cannot be undone.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="/courses/{{ course.id }}/" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
