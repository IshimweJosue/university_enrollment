{% extends 'base.html' %}

{% block title %}{% if form.instance.id %}Grade Enrollment{% else %}Enroll Student{% endif %}{% endblock %}

{% block content %}
<h2>{% if form.instance.id %}Update Grade{% else %}Enroll Student in Course{% endif %}</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    
    <div class="form-actions">
        <button type="submit" class="btn btn-success">Save Enrollment</button>
        <a href="/enrollments/" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
